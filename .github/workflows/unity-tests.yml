name: Repository Validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  static-validation:
    name: Static project validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON and assembly definitions
        shell: bash
        run: |
          find Assets Packages -type f \( -name '*.json' -o -name '*.asmdef' \) -print0 \
            | xargs -0 -n1 jq empty

      - name: Reject generated Unity folders
        shell: bash
        run: |
          if git ls-files | grep -E '^(Library|Temp|Builds|Logs|UserSettings)/'; then
            echo 'Generated Unity folders must not be committed.' >&2
            exit 1
          fi

  editmode:
    name: EditMode / Unity 6000.3.9f1
    if: ${{ vars.UNITY_CI_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-6000.3.9f1-${{ hashFiles('Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-6000.3.9f1-

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: 6000.3.9f1
          testMode: editmode
          artifactsPath: TestResults
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-editmode-results
          path: TestResults
          if-no-files-found: warn
